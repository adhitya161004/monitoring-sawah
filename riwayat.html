<script>
    // ... bagian atas sama ...
    globalData.forEach(row => {
      let tr = document.createElement("tr");
      tr.innerHTML = `
        <td style="font-weight:600; color:white;">${row.waktu || "-"}</td>
        <td>${row.sawah !== undefined ? row.sawah.toFixed(1) : "-"} cm</td>
        <td>${row.tambak !== undefined ? row.tambak.toFixed(1) : "-"} cm</td>
        <td>${row.soil !== undefined ? row.soil : "-"} %</td>
        <td>${row.voltage !== undefined ? row.voltage.toFixed(1) : "-"} V</td>
      `;
      tbody.appendChild(tr);
    });
    // ... bagian download csv juga ganti voltage ...
</script>
