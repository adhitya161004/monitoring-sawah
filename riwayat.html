<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riwayat Data Lengkap - Monitoring Sawah</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root { --bg-main: #0a192f; --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); --text-main: #e2e8f0; --accent-yellow: #fbbf24; --accent-blue: #3b82f6; --accent-green: #10b981; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: radial-gradient(circle at top right, #112240, var(--bg-main)); color: var(--text-main); min-height: 100vh; padding: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border); }
    .nav-btn { background: rgba(255, 255, 255, 0.1); color: white; text-decoration: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
    .glass-card { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
    .filter-section { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; }
    input[type="date"] { background: #112240; border: 1px solid var(--glass-border); color: white; padding: 8px; border-radius: 5px; outline: none; }
    .btn-action { background: var(--accent-blue); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
    .btn-action.download { background: var(--accent-green); }
    .table-wrapper { width: 100%; overflow-x: auto; max-height: 60vh; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; text-align: left; min-width: 1000px; }
    thead th { background: rgba(0, 0, 0, 0.3); color: var(--accent-yellow); padding: 12px; position: sticky; top: 0; font-size: 14px; white-space: nowrap;}
    tbody td { padding: 10px 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); color: #cbd5e1; font-size: 13px; }
    #loading { text-align: center; padding: 30px; font-size: 18px; color: var(--accent-yellow); display: none; }
  </style>
</head>
<body>

  <header>
    <div class="title-wrapper"><h1 style="color:var(--accent-yellow)"><i class="fa-solid fa-database"></i> Database Harian & Riwayat Alat</h1></div>
    <a href="index.html" class="nav-btn"><i class="fa-solid fa-chart-pie"></i> Dashboard Utama</a>
  </header>

  <div class="glass-card">
    <div class="filter-section">
      <div style="display: flex; align-items: center; gap: 10px;">
        <label>Pilih Tanggal:</label>
        <input type="date" id="filterDate" onchange="applyFilter()">
      </div>
      <button class="btn-action" onclick="refreshData()"><i class="fa-solid fa-sync"></i> Refresh Data</button>
      <button class="btn-action download" onclick="exportToExcel()"><i class="fa-solid fa-download"></i> Download Excel</button>
      <div id="dataCount" style="margin-left:auto; font-weight:600; color:var(--accent-yellow);">Memuat data...</div>
    </div>

    <div id="loading"><i class="fa-solid fa-spinner fa-spin"></i> Menarik data dari server...</div>

    <div class="table-wrapper">
      <table id="dataTable">
        <thead>
          <tr>
            <th>Waktu (WIB)</th>
            <th>Sawah (cm)</th>
            <th>Tambak (cm)</th>
            <th>Tanah (%)</th>
            <th>Baterai (V)</th>
            <th>Durasi Pompa 1</th>
            <th>Durasi Pompa 2</th>
            <th>Waktu Akt Buka</th>
            <th>Jml Buka</th>
            <th>Jml Tutup</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const firebaseUrl = "https://my-monitoringsawaharnf-default-rtdb.asia-southeast1.firebasedatabase.app/riwayat_data.json?auth=qvhTBUaXXmJpfFKgd8HMrgwIEwR5uK43QMC3k7FU";
    let masterData = [];

    // Format Detik ke Jam:Menit:Detik
    function formatWaktu(detik) {
      if(detik === undefined || detik === null) return "00:00:00";
      const j = Math.floor(detik / 3600), m = Math.floor((detik % 3600) / 60), d = detik % 60;
      return [j,m,d].map(v => v < 10 ? "0"+v : v).join(":");
    }

    async function refreshData() {
      document.getElementById('loading').style.display = "block";
      document.getElementById('tableBody').innerHTML = "";
      
      try {
        const response = await fetch(firebaseUrl);
        const data = await response.json();
        document.getElementById('loading').style.display = "none";

        if (data) {
          masterData = Object.values(data).reverse();
          applyFilter();
        }
      } catch (e) {
        document.getElementById('loading').style.display = "none";
        document.getElementById('dataCount').innerText = "Gagal mengambil data.";
      }
    }

    function renderTable(dataArray) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = "";
      
      dataArray.forEach(row => {
        let tr = document.createElement("tr");
        tr.innerHTML = `
          <td style="font-weight:600; color:white;">${row.waktu || "-"}</td>
          <td>${row.sawah !== undefined ? row.sawah.toFixed(1) : "0"}</td>
          <td>${row.tambak !== undefined ? row.tambak.toFixed(1) : "0"}</td>
          <td>${row.soil !== undefined ? row.soil : "0"}</td>
          <td>${row.voltage !== undefined ? row.voltage.toFixed(1) : "0"}</td>
          <td style="color:#3b82f6">${formatWaktu(row.durP1)}</td>
          <td style="color:#3b82f6">${formatWaktu(row.durP2)}</td>
          <td style="color:#10b981">${formatWaktu(row.durAktBuka)}</td>
          <td style="color:#fbbf24">${row.cntBuka || 0} Kali</td>
          <td style="color:#ef4444">${row.cntTutup || 0} Kali</td>
        `;
        tbody.appendChild(tr);
      });
      document.getElementById('dataCount').innerText = "Total: " + dataArray.length + " Baris";
    }

    function applyFilter() {
      const selectedDate = document.getElementById('filterDate').value;
      const filtered = selectedDate ? masterData.filter(r => r.waktu && r.waktu.includes(selectedDate)) : masterData;
      renderTable(filtered);
    }

    function exportToExcel() {
      const selectedDate = document.getElementById('filterDate').value;
      const dataToExport = selectedDate ? masterData.filter(r => r.waktu && r.waktu.includes(selectedDate)) : masterData;
      if (dataToExport.length === 0) return alert("Tidak ada data untuk di-download!"); 
      
      let csvContent = "Waktu,Sawah(cm),Tambak(cm),Tanah(%),Baterai(V),Durasi P1,Durasi P2,Waktu Aktuator Terbuka,Jumlah Buka,Jumlah Tutup\n";
      
      dataToExport.forEach(r => {
        let sawah = r.sawah !== undefined ? r.sawah : "0";
        let tambak = r.tambak !== undefined ? r.tambak : "0";
        let soil = r.soil !== undefined ? r.soil : "0";
        let voltage = r.voltage !== undefined ? r.voltage : "0";
        let waktu = r.waktu || "";
        
        csvContent += `${waktu},${sawah},${tambak},${soil},${voltage},${formatWaktu(r.durP1)},${formatWaktu(r.durP2)},${formatWaktu(r.durAktBuka)},${r.cntBuka || 0},${r.cntTutup || 0}\n`;
      });
      
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `Laporan_Data_Sawah_${selectedDate || 'Semua'}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    window.onload = refreshData;
  </script>
</body>
</html>
