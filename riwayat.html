<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riwayat Data - Monitoring Sawah</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-main: #0a192f;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #e2e8f0;
      --accent-yellow: #fbbf24;
      --accent-blue: #3b82f6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    
    body {
      background: radial-gradient(circle at top left, #112240, var(--bg-main));
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
    }

    header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border);
    }
    .title-wrapper h1 { font-size: 24px; color: var(--accent-yellow); font-weight: 700; }
    
    .nav-btn {
      background: rgba(255, 255, 255, 0.1); color: white; text-decoration: none;
      padding: 8px 16px; border-radius: 8px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s;
    }
    .nav-btn:hover { background: rgba(255, 255, 255, 0.2); }

    .glass-card {
      background: var(--glass-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .table-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    
    .btn-action {
      background: var(--accent-blue); color: white; border: none; padding: 10px 20px;
      border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s;
    }
    .btn-action:hover { background: #2563eb; }
    .btn-action.download { background: #10b981; }
    .btn-action.download:hover { background: #059669; }

    .table-wrapper { width: 100%; overflow-x: auto; max-height: 60vh; }
    table { width: 100%; border-collapse: collapse; text-align: left; min-width: 600px; }
    thead th { background: rgba(0, 0, 0, 0.3); color: var(--accent-yellow); padding: 15px; position: sticky; top: 0; font-weight: 600; letter-spacing: 1px; }
    tbody td { padding: 12px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); color: #cbd5e1; }
    tbody tr:hover { background: rgba(255, 255, 255, 0.05); }

    .loading-text { text-align: center; padding: 30px; font-size: 18px; color: var(--accent-yellow); display: none; }
  </style>
</head>
<body>

  <header>
    <div class="title-wrapper">
      <h1><i class="fa-solid fa-database"></i> Database Riwayat Firebase</h1>
    </div>
    <a href="index.html" class="nav-btn"><i class="fa-solid fa-chart-pie"></i> Kembali ke Dashboard</a>
  </header>

  <div class="glass-card">
    <div class="table-controls">
      <button class="btn-action" onclick="ambilDataFirebase()"><i class="fa-solid fa-rotate-right"></i> Refresh Data</button>
      <button class="btn-action download" onclick="downloadCSV()"><i class="fa-solid fa-download"></i> Export ke Excel (CSV)</button>
    </div>

    <div class="loading-text" id="loading">
      <i class="fa-solid fa-spinner fa-spin"></i> Mengambil data dari Firebase...
    </div>

    <div class="table-wrapper">
      <table id="dataTable">
        <thead>
          <tr>
            <th>Waktu (WIB)</th>
            <th>Tinggi Sawah</th>
            <th>Tinggi Tambak</th>
            <th>Kelembapan Tanah</th>
            <th>Tegangan Baterai</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          </tbody>
      </table>
    </div>
  </div>

  <script>
    const firebaseUrl = "https://my-monitoringsawaharnf-default-rtdb.asia-southeast1.firebasedatabase.app/riwayat_data.json?auth=qvhTBUaXXmJpfFKgd8HMrgwIEwR5uK43QMC3k7FU";
    let globalData = []; 

    async function ambilDataFirebase() {
      const tbody = document.getElementById('tableBody');
      const loading = document.getElementById('loading');
      tbody.innerHTML = ""; loading.style.display = "block";

      try {
        const response = await fetch(firebaseUrl);
        const data = await response.json();
        loading.style.display = "none";

        if (data) {
          globalData = Object.values(data);
          globalData.sort((a, b) => new Date(b.waktu) - new Date(a.waktu));

          globalData.forEach(row => {
            let tr = document.createElement("tr");
            tr.innerHTML = `
              <td style="font-weight:600; color:white;">${row.waktu || "-"}</td>
              <td>${row.sawah !== undefined ? row.sawah.toFixed(1) : "-"} cm</td>
              <td>${row.tambak !== undefined ? row.tambak.toFixed(1) : "-"} cm</td>
              <td>${row.soil !== undefined ? row.soil : "-"} %</td>
              <td>${row.voltage !== undefined ? row.voltage.toFixed(1) : "-"} V</td>
            `;
            tbody.appendChild(tr);
          });
        } else {
          tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>Belum ada data riwayat di Firebase.</td></tr>";
        }
      } catch (error) {
        loading.style.display = "none";
        console.error("Gagal mengambil data:", error);
        tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; color:#ef4444;'>Gagal mengambil data. Periksa koneksi internet.</td></tr>";
      }
    }

    function downloadCSV() {
      if (globalData.length === 0) { alert("Tidak ada data untuk di-download!"); return; }
      let csvContent = "data:text/csv;charset=utf-8,Waktu,Tinggi Sawah (cm),Tinggi Tambak (cm),Kelembapan Tanah (%),Tegangan Baterai (V)\n";
      globalData.forEach(row => {
        let sawah = row.sawah !== undefined ? row.sawah : "";
        let tambak = row.tambak !== undefined ? row.tambak : "";
        let soil = row.soil !== undefined ? row.soil : "";
        let volt = row.voltage !== undefined ? row.voltage : "";
        let waktu = row.waktu || "";
        csvContent += `${waktu},${sawah},${tambak},${soil},${volt}\n`;
      });
      var encodedUri = encodeURI(csvContent);
      var link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", "Riwayat_Monitoring_Sawah.csv");
      document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    window.onload = ambilDataFirebase;
  </script>
</body>
</html>
