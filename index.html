<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitoring Sawah by ARNF</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-main: #0a192f; --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #e2e8f0; --text-muted: #94a3b8; --accent-yellow: #fbbf24;
      --accent-blue: #3b82f6; --status-on: #10b981; --status-off: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: var(--bg-main); color: var(--text-main); padding: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
    .glass-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
    .status-badge { background: rgba(16, 185, 129, 0.2); color: #10b981; padding: 5px 15px; border-radius: 20px; font-size: 13px; }
    .status-badge.offline { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    .sensor-card { text-align: center; }
    .sensor-value { font-size: 32px; font-weight: 700; color: var(--accent-yellow); margin-top: 10px; }
    .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .btn-group { display: flex; gap: 5px; }
    button { border: none; padding: 8px 12px; border-radius: 8px; font-weight: 600; cursor: pointer; background: rgba(255,255,255,0.1); color: white; transition: 0.3s; }
    button.active-on { background: var(--status-on) !important; color: white; box-shadow: 0 0 10px var(--status-on); }
    button.active-off { background: var(--status-off) !important; color: white; box-shadow: 0 0 10px var(--status-off); }
    .device-val { font-family: monospace; color: var(--accent-yellow); background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 5px; }
    .chart-box { height: 250px; margin-top: 15px; }
  </style>
</head>
<body>
  <header>
    <h2 style="color:var(--accent-yellow);">Monitoring Sawah by ARNF</h2>
    <div id="conn-status" class="status-badge offline"><span id="status-text">OFFLINE</span></div>
  </header>

  <div class="dashboard-grid">
    <div class="glass-card sensor-card"><div>Kelembapan Tanah</div><div class="sensor-value" id="soil">-- %</div></div>
    <div class="glass-card sensor-card"><div>Tinggi Sawah</div><div class="sensor-value" id="sawah">-- cm</div></div>
    <div class="glass-card sensor-card"><div>Tinggi Tambak</div><div class="sensor-value" id="tambak">-- cm</div></div>
    <div class="glass-card sensor-card"><div>Tegangan</div><div class="sensor-value" id="battery">-- V</div></div>
  </div>

  <div class="control-grid">
    <div class="glass-card">
      <h3 style="margin-bottom:15px; color:var(--accent-blue);">Kontrol Manual</h3>
      <div class="control-row">
        <span>Mode</span>
        <div class="btn-group">
          <button id="btn-auto" onclick="setMode('AUTO')">AUTO</button>
          <button id="btn-manual" onclick="setMode('MANUAL')">MANUAL</button>
        </div>
      </div>
      <div class="control-row">
        <span>Pompa 1</span>
        <div class="btn-group">
          <button id="btn-p1-on" onclick="sendManual('pompa1', 'ON')">ON</button>
          <button id="btn-p1-off" onclick="sendManual('pompa1', 'OFF')">OFF</button>
        </div>
      </div>
      <div class="control-row">
        <span>Pompa 2</span>
        <div class="btn-group">
          <button id="btn-p2-on" onclick="sendManual('pompa2', 'ON')">ON</button>
          <button id="btn-p2-off" onclick="sendManual('pompa2', 'OFF')">OFF</button>
        </div>
      </div>
      <div class="control-row">
        <span>Aktuator</span>
        <div class="btn-group">
          <button id="btn-akt-buka" onclick="sendManual('aktuator', 'BUKA')">OPEN</button>
          <button id="btn-akt-tutup" onclick="sendManual('aktuator', 'CLOSE')">CLOSE</button>
        </div>
      </div>
    </div>

    <div class="glass-card">
      <h3 style="margin-bottom:15px; color:var(--accent-blue);">Target & Durasi</h3>
      <div class="control-row"><span>Target Tinggi</span><span class="device-val"><span id="target-status">--</span> cm</span></div>
      <input type="range" id="settingSlider" min="0" max="30" style="width:100%; margin:10px 0;" oninput="updateSliderValue(this.value)">
      <div style="text-align:center; margin-bottom:10px;"><span id="sliderValue">14</span> cm</div>
      <button onclick="setSetting()" style="width:100%; background:var(--accent-blue);">KIRIM TARGET</button>
      <hr style="margin:15px 0; border:0; border-top:1px solid var(--glass-border);">
      <div class="control-row"><span>Pompa 1</span><span id="durasi-p1" class="device-val">00:00:00</span></div>
      <div class="control-row"><span>Pompa 2</span><span id="durasi-p2" class="device-val">00:00:00</span></div>
      <div class="control-row"><span>Aktuator</span><span id="durasi-akt" class="device-val">00:00:00</span></div>
    </div>
  </div>

  <div class="glass-card">
    <h3 style="color:var(--accent-yellow);">Grafik Pemantauan</h3>
    <div class="chart-box"><canvas id="soilChart"></canvas></div>
    <div class="chart-box"><canvas id="sawahChart"></canvas></div>
    <div class="chart-box"><canvas id="tambakChart"></canvas></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
