<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Sawah Realtime</title>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background: #2f4156;
            color: white;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
            gap: 15px;
            padding: 10px;
        }
        .card {
            background: white;
            width: 150px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .card h3 {
            margin-bottom: 10px;
            font-size: 14px;
            color: #555;
        }
        .value {
            font-size: 22px;
            font-weight: bold;
            color: #27ae60;
        }
        .chart-box {
            width: 90%;
            max-width: 800px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <header>🌾 Monitoring Sawah Realtime</header>

    <div class="container">
        <div class="card">
            <h3>Soil Moisture</h3>
            <div id="soil" class="value">- %</div>
        </div>
        <div class="card">
            <h3>Tinggi Sawah</h3>
            <div id="sawah" class="value">- cm</div>
        </div>
        <div class="card">
            <h3>Tinggi Tambak</h3>
            <div id="tambak" class="value">- m</div>
        </div>
        <div class="card">
            <h3>Battery</h3>
            <div id="battery" class="value">- %</div>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="soilChart"></canvas>
    </div>

    <script src="app.js"></script>
</body>
</html>
